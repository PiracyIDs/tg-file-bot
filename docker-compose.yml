version: "3.9"

services:
  bot:
    build: .
    container_name: tg_file_bot
    restart: unless-stopped
    env_file: .env
    environment:
      # Redundant with Dockerfile ENV but makes it explicit for overrides
      PYTHONPATH: /app
      REDIS_URI: redis://redis:6379/0
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bot_net
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mongo:
    image: mongo:7.0
    container_name: tg_file_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: tg_file_storage
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - bot_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: tg_file_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis_data:/data
    networks:
      - bot_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  bot_net:
    driver: bridge

volumes:
  mongo_data:
  mongo_config:
  redis_data:
